<div id="budget-detail" class="flex flex-col border border-slate-900 rounded-md bg-slate-900/25 gap-y-5 w-full min-h-32 p-4">
  <form hx-put="/budgets/{{ budget.id }}">
    <div class="text-sm text-slate-400 mb-4">Edit budget for <strong class="text-teal-700">{{ budget.category_name }}</strong></div>
    <label class="block text-xs text-slate-500 mb-1">Amount</label>
    <input name="amount" type="number" min="0" value="{{ budget.amount }}" class="w-full rounded bg-slate-900 text-slate-300 p-2">
    <label class="flex gap-2 mt-3 text-xs text-slate-400">
      <input name="rollover" type="checkbox" value="true" {% if budget.rollover %}checked{% endif %}>
      Copy this budget into future periods
    </label>
    <div class="flex justify-between mt-4">
      <button type="button" hx-delete="/budgets/{{ budget.id }}" hx-confirm="Delete this budget?" hx-target="#bud_{{ budget.id }}" hx-swap="outerHTML" class="text-xs text-rose-500">Delete</button>
      <button type="submit" class="rounded bg-teal-800 px-3 py-2 text-xs text-white">Update</button>
    </div>
  </form>
  {% if transactions %}
    <div class="border-t border-slate-800 pt-3">
      <div class="text-xs font-semibold text-slate-500 mb-2">Transactions this period</div>
      {% for transaction in transactions %}
        <div class="flex justify-between py-1 text-xs text-slate-400">
          <span>{{ transaction.description }}</span>
          <span>${{ transaction.display_amount }}</span>
        </div>
      {% endfor %}
    </div>
  {% endif %}
</div>
